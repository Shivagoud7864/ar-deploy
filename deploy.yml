apiVersion: apps/v1
kind: Deployment
metadata:
  name: internetbanking-service
  labels:
    app: bank
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bank
  template:
    metadata:
      labels:
        app: bank
    spec:
      containers:
      - name: cont1
        image: shivachams7784/mb-image:latest
---
apiVersion: v1
kind: Service
metadata:
  name: internetbanking-service
spec:
  type: LoadBalancer
  selector:
    app: bank
  ports:
    - port: 80
      nodeport: 31433
